<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#f8f9fa",
                    "primary-container": "#135f67",
                    "on-secondary-fixed-variant": "#354a53",
                    "on-surface": "#191c1d",
                    "surface-container": "#edeeef",
                    "secondary-container": "#cfe6f2",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#071e27",
                    "surface-container-highest": "#e1e3e4",
                    "on-tertiary-fixed-variant": "#6b3a16",
                    "primary": "#00464d",
                    "surface-container-low": "#f3f4f5",
                    "secondary-fixed": "#cfe6f2",
                    "secondary": "#4c616c",
                    "primary-fixed": "#abeef7",
                    "outline": "#6f7979",
                    "on-error": "#ffffff",
                    "tertiary": "#62330f",
                    "secondary-fixed-dim": "#b4cad6",
                    "surface": "#f8f9fa",
                    "primary-fixed-dim": "#90d1da",
                    "surface-tint": "#206770",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed": "#311300",
                    "on-primary-fixed-variant": "#004f56",
                    "on-primary-container": "#95d6df",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e3e4",
                    "inverse-on-surface": "#f0f1f2",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f4949",
                    "tertiary-container": "#7e4924",
                    "on-background": "#191c1d",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#001f23",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#ffb688",
                    "surface-bright": "#f8f9fa",
                    "tertiary-fixed": "#ffdbc7",
                    "inverse-primary": "#90d1da",
                    "outline-variant": "#bec8c9",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2e3132",
                    "on-secondary-container": "#526772",
                    "surface-dim": "#d9dadb",
                    "on-tertiary-container": "#ffbe95"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Public Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-overlay {
            background: linear-gradient(rgba(0, 70, 77, 0.4), rgba(0, 70, 77, 0.4));
            clip-path: polygon(0% 0%, 0% 100%, 15% 100%, 15% 25%, 85% 25%, 85% 65%, 15% 65%, 15% 100%, 100% 100%, 100% 0%);
        }
        .scanner-line {
            height: 2px;
            background: #90d1da;
            box-shadow: 0 0 15px #90d1da;
        }
        .lithic-gradient {
            background: linear-gradient(135deg, #00464d 0%, #135f67 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Shell -->
<header class="fixed top-0 w-full z-50 bg-slate-50 dark:bg-cyan-950 flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="text-xl font-bold tracking-tighter text-cyan-900 dark:text-cyan-50 font-headline">Sovereign Revenue</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-cyan-900 dark:text-cyan-100 hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
</button>
<button class="p-2 text-cyan-900 dark:text-cyan-100 hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 text-cyan-900 dark:text-cyan-100 hover:bg-slate-200/50 transition-colors">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Viewport (Camera Simulator) -->
<main class="flex-1 relative mt-16 pb-20 overflow-hidden bg-black">
<!-- Camera Background -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-70" data-alt="POV of a mobile phone camera held over a modern government document with QR code on a wooden desk with natural morning light" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuABN4IKYPL9k9IDS_yBSU0_ZTE9JZmYqC8UvnMHcuuLIn1f4bTZjZrTydPbIRJkBQa8RV-uZxXGN3fQ2xcBOHt6ikBxtRzefI7FwJ3n5E51QQHgdb2i64e8g-ikxGaze65BsxcmQzhxcFurZ8f6TVARssXearHwrIOmBdmVOsCWMkmUFHAdWBofbYG4YSXreGWMCp-c347Vfpq-H7yt1sEt0AMGL1rsaxdcNHnc1VWvULJ3YvBaWkNz-A3s1xJaOlbI43Z4tkV5Hy7A')"></div>
</div>
<!-- Scanner UI Overlay -->
<div class="absolute inset-0 z-10 scanner-overlay backdrop-blur-[1px]"></div>
<!-- Scanning Frame -->
<div class="absolute inset-0 z-20 flex flex-col items-center justify-start pt-[176px]">
<div class="w-[70vw] aspect-[3/4] relative">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-fixed-dim rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-fixed-dim rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-fixed-dim rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-fixed-dim rounded-br-xl"></div>
<!-- Moving Scanner Line -->
<div class="scanner-line w-full absolute top-[20%]"></div>
<!-- Targeting Reticle -->
<div class="absolute inset-0 flex items-center justify-center opacity-30">
<span class="material-symbols-outlined text-primary-fixed text-6xl" data-icon="filter_center_focus">filter_center_focus</span>
</div>
</div>
<!-- Contextual Instructions -->
<div class="mt-8 text-center px-8">
<h2 class="text-white font-headline text-lg font-bold tracking-tight mb-2">Align QR Code</h2>
<p class="text-primary-fixed text-sm font-medium opacity-90">Position the taxpayer receipt or ID card within the frame to begin verification.</p>
</div>
</div>
<!-- Action Selector (Floating Layer) -->
<div class="absolute bottom-8 left-0 w-full z-30 px-6">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-full p-1.5 flex gap-1 shadow-2xl">
<button class="flex-1 py-3 px-4 rounded-full flex items-center justify-center gap-2 bg-primary text-on-primary font-label text-sm font-semibold lithic-gradient">
<span class="material-symbols-outlined text-lg" data-icon="receipt_long">receipt_long</span>
                    Validate Receipt
                </button>
<button class="flex-1 py-3 px-4 rounded-full flex items-center justify-center gap-2 text-on-surface-variant font-label text-sm font-medium hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="badge">badge</span>
                    Scan ID Card
                </button>
</div>
</div>
<!-- Camera Controls -->
<div class="absolute right-6 top-6 z-30 flex flex-col gap-4">
<button class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white border border-white/20">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
<button class="w-12 h-12 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white border border-white/20">
<span class="material-symbols-outlined" data-icon="zoom_in">zoom_in</span>
</button>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 h-20 pb-safe bg-white dark:bg-cyan-950 z-50 rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 active:bg-slate-100 dark:active:bg-cyan-900 scale-95 duration-100 ease-out">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 active:bg-slate-100 dark:active:bg-cyan-900 scale-95 duration-100 ease-out">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest mt-1">Collect</span>
</div>
<div class="flex flex-col items-center justify-center bg-cyan-100 dark:bg-cyan-800 text-cyan-900 dark:text-cyan-50 rounded-2xl px-5 py-1.5 active:bg-slate-100 dark:active:bg-cyan-900 scale-95 duration-100 ease-out">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest mt-1">Scanner</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 active:bg-slate-100 dark:active:bg-cyan-900 scale-95 duration-100 ease-out">
<span class="material-symbols-outlined" data-icon="cloud_sync">cloud_sync</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest mt-1">Sync</span>
</div>
</nav>
</body></html>

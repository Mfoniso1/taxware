<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Civic Ledger - Field Agent Collection</title>

        darkMode: "class",

          extend: {

                    "background": "#f8f9fa",

                    "on-secondary-fixed-variant": "#354a53",
                    "on-surface": "#191c1d",
                    "surface-container": "#edeeef",
                    "secondary-container": "#cfe6f2",

                    "primary": "#00464d",

                    "secondary-fixed": "#cfe6f2",
                    "secondary": "#4c616c",
                    "primary-fixed": "#abeef7",
                    "outline": "#6f7979",
                    "on-error": "#ffffff",
                    "tertiary": "#62330f",
                    "secondary-fixed-dim": "#b4cad6",
                    "surface": "#f8f9fa",
                    "primary-fixed-dim": "#90d1da",
                    "surface-tint": "#206770",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed": "#311300",
                    "on-primary-fixed-variant": "#004f56",
                    "on-primary-container": "#95d6df",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e1e3e4",

            "borderRadius": {

                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Public Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        }
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .lithic-gradient {
        background: linear-gradient(135deg, #00464d 0%, #135f67 100%);
      }
      .tonal-sculpt {
        background-color: #f3f4f5;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-slate-50 dark:bg-cyan-950 flex justify-between items-center px-6 h-16 w-full font-public-sans tracking-tight">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-900 dark:text-cyan-100" data-icon="account_balance">account_balance</span>
<h1 class="text-xl font-bold tracking-tighter text-cyan-900 dark:text-cyan-50">TaxTrack NG</h1>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-cyan-800/50 transition-colors">
<span class="material-symbols-outlined text-slate-500" data-icon="sync">sync</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-cyan-800/50 transition-colors">
<span class="material-symbols-outlined text-slate-500" data-icon="notifications">notifications</span>
</button>
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed text-sm" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 pt-20 pb-28 px-4 max-w-lg mx-auto w-full">
<!-- Context Header -->
<div class="mb-8 mt-2">
<p class="font-label text-[11px] font-bold uppercase tracking-[0.15em] text-on-surface-variant mb-1">Collection Mode</p>
<h2 class="font-headline text-3xl font-extrabold text-primary leading-tight">Record Payment</h2>
<p class="text-on-surface-variant body-sm mt-1">Authorized Agent Portal • Lagos Central Zone</p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Revenue Head Selection -->
<section>
<label class="block font-label text-sm font-semibold text-on-surface mb-3 ml-1">Select Revenue Head<!-- Khamis-->
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-start p-4 bg-surface-container-lowest rounded-xl border-l-4 border-surface-tint shadow-sm active:scale-95 transition-transform text-left">
<span class="material-symbols-outlined text-primary mb-2" data-icon="storefront">storefront</span>
<span class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Market Toll</span>
</button>
<button class="flex flex-col items-start p-4 bg-surface-container-low rounded-xl border-l-4 border-outline-variant text-left hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary mb-2" data-icon="directions_car">directions_car</span>
<span class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Road Tax</span>
</button>
<button class="flex flex-col items-start p-4 bg-surface-container-low rounded-xl border-l-4 border-outline-variant text-left hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary mb-2" data-icon="home_work">home_work</span>
<span class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Property Fee</span>
</button>
<button class="flex flex-col items-start p-4 bg-surface-container-low rounded-xl border-l-4 border-outline-variant text-left hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-secondary mb-2" data-icon="more_horiz">more_horiz</span>
<span class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider">Others</span>
</button>
</div>
</label></section>
<!-- Amount Input -->
<section>
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-sm border-b-2 border-primary-container">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Transaction Amount (NGN)</label>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-headline font-bold text-primary">₦</span>
<input class="w-full bg-transparent border-none p-0 text-4xl font-headline font-black text-on-surface focus:ring-0 placeholder:text-surface-variant" placeholder="0.00" type="number"/>
</div>
</div>
</section>
<!-- Payment Method -->
<section>
<label class="block font-label text-sm font-semibold text-on-surface mb-3 ml-1">Payment Method</label>
<div class="space-y-2">
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer group hover:bg-primary-fixed-dim/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary group-active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<div>
<p class="font-label font-bold text-on-surface">Cash Payment</p>
<p class="text-xs text-on-surface-variant">Physical currency collection</p>
</div>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer group hover:bg-primary-fixed-dim/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<div>
<p class="font-label font-bold text-on-surface">POS Terminal</p>
<p class="text-xs text-on-surface-variant">Debit/Credit card swipe</p>
</div>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl cursor-pointer group hover:bg-primary-fixed-dim/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="cell_tower">cell_tower</span>
</div>
<div>
<p class="font-label font-bold text-on-surface">Mobile Transfer</p>
<p class="text-xs text-on-surface-variant">Bank app transfer verification</p>
</div>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio"/>
</label>
</div>
</section>
<!-- Metadata Info -->
<div class="p-4 bg-tertiary-container/10 rounded-lg flex gap-3 items-start">
<span class="material-symbols-outlined text-tertiary text-sm mt-0.5" data-icon="info">info</span>
<p class="text-[11px] text-tertiary font-medium">This transaction will be geotagged and timestamped for the TaxTrack NG audit log.</p>
</div>
</div>
<!-- Action Button -->
<div class="mt-10 px-2">
<button class="w-full lithic-gradient py-5 rounded-xl text-on-primary font-headline font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.97] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Confirm Collection
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 h-20 pb-safe bg-white dark:bg-cyan-950 rounded-t-xl border-t border-slate-100 dark:border-cyan-900 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 transition-all active:scale-95 duration-100 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-cyan-100 dark:bg-cyan-800 text-cyan-900 dark:text-cyan-50 rounded-2xl px-5 py-1.5 transition-all scale-95 duration-100 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest">Collect</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 transition-all active:scale-95 duration-100 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="qr_code_scanner">qr_code_scanner</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest">Scanner</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-cyan-700 transition-all active:scale-95 duration-100 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="cloud_sync">cloud_sync</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-widest">Sync</span>
</a>
</nav>
</body></html>

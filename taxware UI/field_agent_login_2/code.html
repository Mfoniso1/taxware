<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Civic Ledger - Field Agent Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "background": "#f8f9fa",
                      "primary-container": "#135f67",
                      "on-secondary-fixed-variant": "#354a53",
                      "on-surface": "#191c1d",
                      "surface-container": "#edeeef",
                      "secondary-container": "#cfe6f2",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed": "#071e27",
                      "surface-container-highest": "#e1e3e4",
                      "on-tertiary-fixed-variant": "#6b3a16",
                      "primary": "#00464d",
                      "surface-container-low": "#f3f4f5",
                      "secondary-fixed": "#cfe6f2",
                      "secondary": "#4c616c",
                      "primary-fixed": "#abeef7",
                      "outline": "#6f7979",
                      "on-error": "#ffffff",
                      "tertiary": "#62330f",
                      "secondary-fixed-dim": "#b4cad6",
                      "surface": "#f8f9fa",
                      "primary-fixed-dim": "#90d1da",
                      "surface-tint": "#206770",
                      "surface-container-high": "#e7e8e9",
                      "on-tertiary-fixed": "#311300",
                      "on-primary-fixed-variant": "#004f56",
                      "on-primary-container": "#95d6df",
                      "error-container": "#ffdad6",
                      "surface-variant": "#e1e3e4",
                      "inverse-on-surface": "#f0f1f2",
                      "error": "#ba1a1a",
                      "on-secondary": "#ffffff",
                      "on-surface-variant": "#3f4949",
                      "tertiary-container": "#7e4924",
                      "on-background": "#191c1d",
                      "on-primary": "#ffffff",
                      "on-primary-fixed": "#001f23",
                      "surface-container-lowest": "#ffffff",
                      "tertiary-fixed-dim": "#ffb688",
                      "surface-bright": "#f8f9fa",
                      "tertiary-fixed": "#ffdbc7",
                      "inverse-primary": "#90d1da",
                      "outline-variant": "#bec8c9",
                      "on-error-container": "#93000a",
                      "inverse-surface": "#2e3132",
                      "on-secondary-container": "#526772",
                      "surface-dim": "#d9dadb",
                      "on-tertiary-container": "#ffbe95"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Public Sans"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .lithic-gradient {
            background: linear-gradient(135deg, #00464d 0%, #135f67 100%);
        }
        .tonal-sculpt-shadow {
            box-shadow: 0 32px 64px -12px rgba(25, 28, 29, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 overflow-hidden">
<!-- Top Branding Anchor (Suppressed Shell for focused journey) -->
<header class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-primary">Civic Ledger</h1>
<p class="text-on-surface-variant font-label text-sm tracking-wide mt-2 uppercase">
            Field Agent Portal
        </p>
</header>
<!-- Main Login Canvas -->
<main class="w-full max-w-md">
<div class="bg-surface-container-lowest rounded-xl p-8 tonal-sculpt-shadow">
<form class="space-y-6">
<!-- Username Field -->
<div class="space-y-2">
<label class="block font-label font-semibold text-on-surface-variant text-sm" for="username">
                        Agent ID / Username
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="person">person</span>
</div>
<input class="block w-full h-[56px] pl-11 bg-surface-variant border-b-2 border-transparent focus:border-primary-container border-t-0 border-x-0 rounded-lg transition-all focus:ring-0 text-on-surface placeholder:text-outline-variant" id="username" name="username" placeholder="Enter agent ID" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label font-semibold text-on-surface-variant text-sm" for="password">
                        Security Credentials
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full h-[56px] pl-11 bg-surface-variant border-b-2 border-transparent focus:border-primary-container border-t-0 border-x-0 rounded-lg transition-all focus:ring-0 text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-outline hover:text-primary">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="lithic-gradient w-full h-[56px] rounded-lg text-on-primary font-headline font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md" type="submit">
                    Initialize Session
                    <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
<!-- Biometric Integration -->
<div class="mt-8 pt-8 border-t border-outline-variant/20">
<div class="text-center mb-6">
<span class="bg-surface-container-lowest px-4 text-xs font-label text-outline uppercase tracking-widest">
                        Or verify with
                    </span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 bg-surface-container-low rounded-lg text-on-surface-variant font-label font-medium hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="fingerprint">fingerprint</span>
                        Biometrics
                    </button>
<button class="flex items-center justify-center gap-2 h-14 bg-surface-container-low rounded-lg text-on-surface-variant font-label font-medium hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="face">face</span>
                        Face ID
                    </button>
</div>
</div>
</div>
<!-- Footer Assistance -->
<footer class="mt-10 text-center space-y-4">
<a class="text-sm font-label font-semibold text-primary hover:underline decoration-2 underline-offset-4" href="#">
                Forgot access credentials?
            </a>
<div class="flex items-center justify-center gap-6 mt-8">
<div class="flex items-center gap-2 text-outline text-xs font-label">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                    System Online
                </div>
<div class="w-px h-4 bg-outline-variant/30"></div>
<div class="text-outline text-xs font-label">
                    v2.4.0-Stable
                </div>
</div>
</footer>
</main>
<!-- Decorative Background Elements (The Architectural Ledger Look) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
<!-- Subtle Pattern -->
<div class="absolute inset-0 opacity-[0.03]" data-alt="subtle repeating dot pattern in deep petrol teal on a light gray background for technical aesthetic" style="background-image: radial-gradient(#00464d 0.5px, transparent 0.5px); background-size: 24px 24px;">
</div>
</div>
</body></html>
